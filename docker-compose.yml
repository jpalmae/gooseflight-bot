services:
  gooseflight-bot:
    build: .
    container_name: gooseflight-bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_token
      AUTHORIZED_USER_ID: ${AUTHORIZED_USER_ID:?Set AUTHORIZED_USER_ID}
      GOOSE_PROVIDER: ${GOOSE_PROVIDER:-avian}
      GOOSE_MODEL: ${GOOSE_MODEL:-glm-5.1}
      AVIAN_API_KEY_FILE: /run/secrets/avian_api_key
      AVIAN_HOST: ${AVIAN_HOST:-https://api.z.ai/api/coding/paas/v4}
      WHISPER_BACKEND: ${WHISPER_BACKEND:-openai}
      OPENAI_API_KEY_FILE: /run/secrets/openai_key
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      TZ: ${TZ:-America/Santiago}
      DATA_DIR: /data
    volumes:
      - bot-data:/data
      - ${WORKSPACE_DIR:-/workspace}:/workspace
    secrets:
      - telegram_token
      - avian_api_key
      - openai_key
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/data/bot.sqlite') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bot-data:

secrets:
  telegram_token:
    file: ./secrets/telegram_token.txt
  avian_api_key:
    file: ./secrets/avian_api_key.txt
  openai_key:
    file: ./secrets/openai_key.txt
